worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Allow receipt image and video uploads (20MB max)
    client_max_body_size 20M;

    upstream saleos_core {
        server saleos-core:8000;
    }

    upstream saleos_telegram {
        server saleos-telegram:8001;
    }

    upstream saleos_tiktok {
        server saleos-tiktok:8002;
    }

    upstream saleos_instagram {
        server saleos-instagram:8003;
    }

    upstream saleos_facebook {
        server saleos-facebook:8004;
    }

    server {
        listen 80;
        server_name _;

        # ── Infrastructure ────────────────────────────────────────────────────

        # Nginx health check — responds directly, no upstream
        location = /health {
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # ── WebSocket — Core service (real-time merchant alerts) ──────────────
        location /ws/ {
            proxy_pass http://saleos_core;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Core service — Auth + central business APIs ───────────────────────
        location /api/v1/auth/ {
            proxy_pass http://saleos_core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/core/ {
            proxy_pass http://saleos_core;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Telegram microservice ─────────────────────────────────────────────
        location /api/v1/telegram/ {
            proxy_pass http://saleos_telegram;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── TikTok microservice ───────────────────────────────────────────────
        location /api/v1/tiktok/ {
            proxy_pass http://saleos_tiktok;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Instagram microservice ────────────────────────────────────────────
        location /api/v1/instagram/ {
            proxy_pass http://saleos_instagram;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Facebook microservice ─────────────────────────────────────────────
        location /api/v1/facebook/ {
            proxy_pass http://saleos_facebook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Catch-all ─────────────────────────────────────────────────────────
        location / {
            return 404 '{"detail":"Route not found"}';
            add_header Content-Type application/json;
        }
    }

    # ── VPS / Production SSL note ─────────────────────────────────────────────
    # To add HTTPS when deploying to VPS:
    # 1. Replace the server block above with two blocks:
    #    - server { listen 80; return 301 https://$host$request_uri; }
    #    - server { listen 443 ssl; ssl_certificate ...; ssl_certificate_key ...; [all locations] }
    # 2. Run Certbot on the VPS to get Let's Encrypt certificates.
    # No application code changes required.
}
